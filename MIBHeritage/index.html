<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manulife Heritage 专家挑战赛</title>
    <style>
        :root { --main-color: #00A764; }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        h1 { color: #333; text-align: center; }
        .question-card { background: #fff; padding: 20px; margin-bottom: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); border-left: 5px solid var(--main-color); }
        .option { display: block; padding: 12px; margin: 8px 0; background: #f8f9fa; border: 1px solid #ddd; border-radius: 8px; cursor: pointer; transition: 0.3s; }
        .option:hover { background: #eef8f3; }
        button { width: 100%; padding: 15px; background: var(--main-color); color: white; border: none; border-radius: 30px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 20px; }
        #result { display: none; background: #fff; padding: 20px; border-radius: 12px; margin-top: 20px; }
        .correct { color: var(--main-color); font-weight: bold; }
        .wrong { color: #e74c3c; font-weight: bold; }
        .explanation { font-size: 0.85em; color: #555; background: #f1f1f1; padding: 10px; border-radius: 5px; margin-top: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Manulife Heritage 挑战赛</h1>
    <div id="quiz-container"></div>
    <button onclick="submitQuiz()">交卷并查看结果</button>
    <div id="result"></div>
</div>

<script>
    // 在这里添加你的 30 道题目
    const questions = [
        { q: "1. Manulife Heritage 提供几种保费缴付期？", options: ["5/10/15年", "6/10/20年", "10/20/30年", "终身"], answer: 1, exp: "答案是 6/10/20年。" },
        { q: "2. Protection Booster 每隔多久提供一次？", options: ["5年", "10年", "15年", "20年"], answer: 1, exp: "每连续 10 个保单年度。" },
        // 你可以在这里继续添加剩下的 28 道题...
    ];

    const container = document.getElementById('quiz-container');
    questions.forEach((item, index) => {
        let html = `<div class="question-card"><p><strong>${item.q}</strong></p>`;
        item.options.forEach((opt, i) => {
            html += `<label class="option"><input type="radio" name="q${index}" value="${i}"> ${opt}</label>`;
        });
        container.innerHTML += html + `</div>`;
    });

    function submitQuiz() {
        let score = 0;
        let resultHtml = "<h2>你的成绩：</h2>";
        questions.forEach((item, index) => {
            const selected = document.querySelector(`input[name="q${index}"]:checked`);
            const val = selected ? parseInt(selected.value) : -1;
            const isCorrect = (val === item.answer);
            if(isCorrect) score += (100/questions.length);
            resultHtml += `<div><p>${item.q} - ${isCorrect ? '<span class="correct">正确</span>' : '<span class="wrong">错误</span>'}</p></div>`;
        });
        document.getElementById('result').style.display = 'block';
        document.getElementById('result').innerHTML = resultHtml + `<h3>总分: ${Math.round(score)} 分</h3>`;
        window.scrollTo(0, 0);
    }
</script>
</body>
</html>
